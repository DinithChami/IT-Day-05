<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
</head>

<body>

    <h1>HTML Form Input Types.</h1>
    <input type="text"> <br><br>
    <input type="button" value="Login"> <br><br>
    <input type="checkbox"> <br><br>
    <input type="color"> <br><br>
    <input type="date"> <br><br>
    <input type="datetime-local"> <br><br>
    <input type="email"> <br><br>
    <input type="file"> <br><br>
    <input type="image"> <br><br>
    <input type="month"> <br><br>
    <input type="number"> <br><br>
    <input type="password"> <br><br>
    <input type="radio"> <br><br>
    <input type="range"> <br><br>
    <input type="reset" value="Reset"><br><br>
    <input type="search"> <br><br>
    <input type="tel"> <br><br>
    <input type="time"><br><br>
    <input type="url"><br><br>
    <input type="week"><br><br>

    <br>

    <fieldset>
        <legend>Form 01</legend>
        <input type="range">
        <br>
        <br>
        <input type="reset">
        <br>
        <br>
        <input type="search">
        <br>
        <br>
        <input type="submit">
        <br>
        <br>
        <input type="tel">
        <br>
    </fieldset>

    <br>

    <fieldset>
        <legend>Form 02</legend>
        <input type="time">
        <br>
        <br>
        <input type="url">
        <br>
        <br>
        <input type="week">
        <br>
        <br>
        <textarea name id></textarea>
    </fieldset>

    <br><br><br><br><br><br>

    <input type="text" placeholder="User Name" style="background-color:chartreuse; border-radius: 50px; padding: 10px; color: red; border-color: blue; ">
    <br>
    <br>
    <input type="password" placeholder="password" style="background-color:chartreuse; border-radius: 50px; padding: 10px; color: red; border-color: blue; ">
    <br>
    <br>

    <select name="" id="">
        <option value="">BMW</option>
        <option value="">Volvo</option>
    </select>

    <hr>
    <br><br>

    <input type="search" placeholder="Search Name" list="names">
    <datalist id="names">
        <option value="saman"></option>
        <option value="kamal"></option>
        <option value="nimal"></option>
        <option value="sunil"></option>
    </datalist>



</body>

</html>
